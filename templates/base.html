<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NASA Demo Flask App{% endblock %}</title>
    <!-- Bootstrap 5 CDN for modern, responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #101522;
            color: #f5f6fa;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }
        .navbar {
            background: #232946;
        }
        .navbar-brand, .nav-link, .footer {
            color: #e7eaf6 !important;
        }
        .footer {
            background: #232946;
            padding: 1rem 0;
            text-align: center;
            margin-top: 2rem;
        }
        .container {
            margin-top: 2rem;
        }
        a {
            color: #a7c7e7;
        }
        a:hover {
            color: #f5f6fa;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <img src="https://www.nasa.gov/wp-content/themes/nasa/assets/images/nasa-logo.svg" alt="NASA Logo" width="40" height="40" style="margin-right:10px;vertical-align:middle;">NASA Flask App
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/apod">APOD</a></li>
                <li class="nav-item"><a class="nav-link" href="/neo">NEO</a></li>
                <li class="nav-item"><a class="nav-link" href="/earth">Earth Imagery</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<footer class="footer">
    Not affiliated with NASA.
</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
